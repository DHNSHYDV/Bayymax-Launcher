<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            -webkit-app-region: drag; /* Allow moving the splash */
        }
        img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            -webkit-user-select: none;
            transition: opacity 1.5s ease-in-out;
            opacity: 1;
        }
    </style>
</head>
<body>
    <img id="logo" src="./assets/splash_logo.png">
    <script>
        setTimeout(() => {
            document.getElementById('logo').style.opacity = '0';
        }, 2200);
    </script>
</body>
</html>
